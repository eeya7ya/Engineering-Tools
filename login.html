<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — eSpark Engineering Tools</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Floating circuit-node canvas (same as main) -->
  <canvas id="bgCanvas"></canvas>

  <!-- ═══════════════════════════════════════════ -->
  <!--              LOGIN PAGE LAYOUT              -->
  <!-- ═══════════════════════════════════════════ -->
  <div class="login-page">

    <!-- ── LEFT PANEL: Geometric Shape Characters ── -->
    <div class="shapes-panel" id="shapesPanel">

      <!-- Brand -->
      <div class="shapes-brand">
        <div class="logo">
          <span class="logo-e">e</span><span class="logo-spark">Spark</span>
        </div>
        <p class="shapes-tagline">Your engineering toolkit awaits</p>
      </div>

      <!-- 4 shapes: same y=0 baseline, sizes & x-positions vary -->
      <div class="shapes-stage">

        <!-- Semi-circle (smallest, leftmost) -->
        <div class="geo-char" id="geo-semi">
          <div class="shape-wrap">
            <div class="shape-bg semi-bg"></div>
            <div class="shape-face semi-face">
              <div class="geo-eyes">
                <div class="geo-eye"><div class="geo-pupil"></div></div>
                <div class="geo-eye"><div class="geo-pupil"></div></div>
              </div>
              <div class="geo-mouth"></div>
            </div>
          </div>
        </div>

        <!-- Pentagon (medium-small) -->
        <div class="geo-char" id="geo-pent">
          <div class="shape-wrap">
            <div class="shape-bg pent-bg"></div>
            <div class="shape-face pent-face">
              <div class="geo-eyes">
                <div class="geo-eye"><div class="geo-pupil"></div></div>
                <div class="geo-eye"><div class="geo-pupil"></div></div>
              </div>
              <div class="geo-mouth"></div>
            </div>
          </div>
        </div>

        <!-- Triangle (medium-tall) -->
        <div class="geo-char" id="geo-tri">
          <div class="shape-wrap">
            <div class="shape-bg tri-bg"></div>
            <div class="shape-face tri-face">
              <div class="geo-eyes">
                <div class="geo-eye"><div class="geo-pupil"></div></div>
                <div class="geo-eye"><div class="geo-pupil"></div></div>
              </div>
              <div class="geo-mouth"></div>
            </div>
          </div>
        </div>

        <!-- Rectangle (tallest, rightmost — closest to login) -->
        <div class="geo-char" id="geo-rect">
          <div class="shape-wrap">
            <div class="shape-bg rect-bg"></div>
            <div class="shape-face rect-face">
              <div class="geo-eyes">
                <div class="geo-eye"><div class="geo-pupil"></div></div>
                <div class="geo-eye"><div class="geo-pupil"></div></div>
              </div>
              <div class="geo-mouth grin-mouth"></div>
            </div>
          </div>
        </div>

      </div><!-- /.shapes-stage -->

    </div><!-- /.shapes-panel -->


    <!-- ── RIGHT PANEL: Login Form ─────────────── -->
    <div class="login-panel">
      <div class="login-card" id="loginCard">

        <div class="login-header">
          <div class="logo" style="justify-content:center;margin-bottom:18px;">
            <span class="logo-e">e</span><span class="logo-spark">Spark</span>
            <span class="logo-sub">Engineering Tools</span>
          </div>
          <h2 class="login-title">Welcome back!</h2>
          <p class="login-subtitle">Sign in to your engineering toolkit</p>
        </div>

        <form class="login-form" id="loginForm" onsubmit="return false;">
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <button type="button" class="forgot-link">Forgot password?</button>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="btn-primary btn-login">Sign In ⚡</button>
        </form>

        <div class="login-divider"><span>or</span></div>

        <div class="login-footer">
          <p>Don't have an account? <a href="#" class="register-link">Create one free</a></p>
        </div>

      </div><!-- /.login-card -->
    </div><!-- /.login-panel -->

  </div><!-- /.login-page -->

  <!-- Custom cursor -->
  <div class="cursor-spark" id="cursorSpark"></div>
  <div class="cursor-dot"   id="cursorDot"></div>

  <script src="login.js"></script>
</body>
</html>
